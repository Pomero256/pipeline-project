

services:
  # The database service
  postgres_db:
    image: postgres:16-alpine
    container_name: local_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Your Express API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local_api
    ports:
      - "3000:3000"
    environment:
      # We use the service name 'postgres_db' instead of 'localhost' 
      # because containers talk to each other over an internal Docker network
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres_db:5432/mydb
      PORT: 3000
    depends_on:
      - postgres_db

volumes:
  pgdata: